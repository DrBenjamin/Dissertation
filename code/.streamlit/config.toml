### `.streamlit/config.toml`
### Secret Management
### Open-Source, hosted on https://github.com/DrBenjamin/dissertation-movement-analysis
### Please reach out to s2616861@ed.ac.uk for any questions
[server]
fileWatcherType = "auto"
runOnSave = true
#sslCertFile = '.cert/fullchain.pem'
#sslKeyFile = '.cert/privkey.pem'
headless = true
enableCORS = true
enableXsrfProtection = false
baseUrlPath = ""
allowRunOnSave = true

# Critical: Set the public address for OIDC redirects (fixes mobile Safari auth issues)
# This tells Streamlit the actual URL it's being served from behind the reverse proxy
address = "0.0.0.0"
port = 8502

# Enable cookie handling for OIDC across browsers
enableStaticServing = true

[global]
developmentMode = false

[browser]
gatherUsageStats = false

[theme]
primaryColor="#eb2d34"
backgroundColor="#FFFFFF"
secondaryBackgroundColor="#f6f5f4"
textColor="#2e3334"
font="sans serif"
